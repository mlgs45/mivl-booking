services:
  postgres:
    image: postgres:16-alpine
    container_name: mivl-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mivl_booking
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - mivl_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mivl_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mivl_postgres_data:
    name: mivl_postgres_data
